server:
  port: 8080

spring:
  application:
    name: learning-blog-server
  datasource:
    url: jdbc:mysql://localhost:3306/learning_blog?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

blog:
  jwt:
    secret: learning-blog-secret-key-learning-blog-secret-key
    expire-hours: 24

